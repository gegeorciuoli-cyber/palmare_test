name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y python3-pip python3-setuptools python3-wheel git zip unzip openjdk-17-jdk

      - name: Install buildozer
        run: pip3 install buildozer cython

      - name: Build APK
        run: buildozer android debug
